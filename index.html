<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule Manager Pro</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
    <div class="toolbar">
        <h1 class="toolbar-title">🗓️ スケジュール管理 Pro</h1>
        <div class="toolbar-main-actions">
            <button onclick="openEntryModal()">+ 予定を追加</button>
            <button class="secondary" onclick="openSettingsModal()">⚙️ 黒マス</button>
            <div class="menu-wrap">
                <button type="button" class="secondary menu-toggle" aria-expanded="false" aria-controls="moreMenu" onclick="toggleMoreMenu(event)">☰</button>
                <div id="moreMenu" class="more-menu" hidden>
                    <button type="button" class="menu-item" onclick="openOptionsModal(); closeMoreMenu();">⚙️ 表示オプション</button>
                    <button type="button" class="menu-item" onclick="exportCSV(); closeMoreMenu();">保存(CSV)</button>
                    <button type="button" class="menu-item" onclick="document.getElementById('csvIn').click(); closeMoreMenu();">読込(CSV)</button>
                    <button type="button" class="menu-item" onclick="resetAll(); closeMoreMenu();">リセット</button>
                </div>
            </div>
        </div>
        <input type="file" id="csvIn" hidden onchange="importCSV(event)">
    </div>

    <table id="scheduleTable">
        <thead>
            <tr id="dayHeaderRow"></tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<!-- Entry Modal (Add/Edit) -->
<div id="entryModal" class="modal-overlay">
    <div class="modal">
        <h2 id="entryModalTitle">予定の追加</h2>
        <input type="hidden" id="editCardId">
        <div class="form-group">
            <label>内容</label>
            <input type="text" id="scheduleText" placeholder="例: 数学A">
        </div>
        <div class="form-group">
            <label>曜日</label>
            <div id="scheduleDayButtons" class="option-button-group"></div>
            <input type="hidden" id="scheduleDay">
        </div>
        <div class="form-group">
            <label>時限</label>
            <div id="schedulePeriodButtons" class="option-button-group"></div>
            <input type="hidden" id="schedulePeriod">
        </div>
        <div class="modal-actions">
            <button class="secondary" onclick="closeModals()">キャンセル</button>
            <button id="deleteBtn" style="background: var(--error); display: none;" onclick="deleteCurrentCard()">削除</button>
            <button onclick="saveSchedule()">保存する</button>
        </div>
    </div>
</div>

<!-- Settings Modal (Black Cell) -->
<div id="settingsModal" class="modal-overlay">
    <div class="modal" style="width: 500px;">
        <h2>黒マスの設定 (休み)</h2>
        <p style="font-size: 12px; color: #666;">チェックを入れたコマは「休み」になり、予定が入りません。</p>
        <div class="settings-grid" id="settingsGrid">
            <!-- JSで生成 -->
        </div>
        <div class="modal-actions">
            <button onclick="closeModals()">閉じる</button>
        </div>
    </div>
</div>

<!-- Options Modal (Days/Periods) -->
<div id="optionsModal" class="modal-overlay">
    <div class="modal">
        <h2>表示オプション</h2>
        <div class="form-group">
            <label>曜日（カンマ区切り）</label>
            <input type="text" id="optionDays" placeholder="例: 月,火,水,木,金,土">
        </div>
        <div class="form-group">
            <label>時限数（1-10）</label>
            <input type="number" id="optionPeriodCount" min="1" max="10" value="5">
        </div>
        <div class="modal-actions">
            <button class="secondary" onclick="closeModals()">キャンセル</button>
            <button onclick="applyOptions()">適用する</button>
        </div>
    </div>
</div>

<div id="statusMessage"></div>

<script src="script.js"></script>

</body>
</html>
